{% extends "base.html" %}
{% block title %}Nouvelle activité — Médiathèque{% endblock %}

{% block content %}
<h1>Ajouter une activité</h1>

<form method="post" class="formulaire">
  <fieldset>
    <div class="form-group">
      <label for="libelle">Libellé <span class="requis">*</span></label>
      <input type="text" id="libelle" name="libelle" required
             placeholder="ex : Réalisateur, Acteur, Chanteur…">
    </div>
  </fieldset>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Ajouter</button>
    <a href="{{ url_for('personnes.liste_activites') }}" class="btn">Annuler</a>
  </div>
</form>
{% endblock %}
