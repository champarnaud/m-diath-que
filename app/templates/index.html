{% extends "base.html" %}
{% block title %}Accueil — Médiathèque{% endblock %}

{% block content %}
<section class="hero">
  <h1>Médiathèque</h1>
  <p>Gérez votre collection de supports audiovisuels.</p>
  <div class="hero-actions">
    <a href="{{ url_for('supports.liste') }}" class="btn btn-primary">Voir la collection</a>
    <a href="{{ url_for('supports.nouveau') }}" class="btn btn-secondary">Ajouter un support</a>
  </div>
</section>

<section class="categories">
  <a href="{{ url_for('supports.liste') }}?type=audio" class="category-card">
    <span class="category-icon">🎵</span>
    <span>Audio</span>
  </a>
  <a href="{{ url_for('supports.liste') }}?type=video" class="category-card">
    <span class="category-icon">🎬</span>
    <span>Vidéo</span>
  </a>
</section>
{% endblock %}
